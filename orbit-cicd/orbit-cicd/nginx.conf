server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: all unmatched paths → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed JS/CSS bundles for 1 year (Vite hashes filenames)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache images and fonts
    location ~* \.(svg|png|jpg|woff2|woff)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html or service worker (always fresh)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
